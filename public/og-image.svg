<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Logo mark -->
  <rect x="80" y="200" width="56" height="56" rx="14" fill="url(#accent)"/>
  <text x="108" y="238" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">S</text>

  <!-- Brand name -->
  <text x="155" y="238" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">StatementFlow</text>

  <!-- Headline -->
  <text x="80" y="330" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="white">Convert Bank Statements</text>
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="url(#accent)">to Excel. Instantly.</text>

  <!-- Subtext -->
  <text x="80" y="470" font-family="Arial, sans-serif" font-size="26" fill="#94a3b8">Free · Secure · No sign-up required · All major UK banks</text>

  <!-- URL -->
  <text x="80" y="560" font-family="Arial, sans-serif" font-size="22" fill="#64748b">statementflow.app</text>
</svg>
